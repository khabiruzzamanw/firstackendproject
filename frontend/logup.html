<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="logup.css" />
    <title>Log up</title>
  </head>

  <body>
    <main>
      <div class="container">
        <div class="title">
          <p>Log up</p>
        </div>

        <form action="/logup" method="post">
          <div class="username-dev">
            <input
              class="username"
              type="text"
              name="username"
              placeholder="Get a unique username"
              title="Don't use that"
            />
          </div>
          <div class="email-dev">
            <input
              class="email"
              type="email"
              name="email"
              placeholder="Put a valid email"
              title="ik gmail,gay"
            />
          </div>
          <div class="security">
            <input
              class="password"
              type="password"
              name="password"
              placeholder="Create a strong password"
              title="Don't use her birth-date"
            />
          </div>
          <div class="submission">
            <button class="register" type="submit" title="make sure to recheck">
              Log up
            </button>
          </div>
        </form>

        <div>
          <p>
            Already a part of our family &#63;<a
              href="login.html"
              class="sign-in"
              >Log in
            </a>
          </p>
        </div>
      </div>
    </main>
    <script></script>
  </body>
</html>
