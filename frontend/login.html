<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="login.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in</title>
  </head>

  <body>
    <main>
      <div class="container">
        <div class="title">
          <p>Log in</p>
        </div>

        <form action="/login" method="post">
          <div class="username">
            <input
              class="email"
              type="email"
              name="email"
              placeholder="Put your email"
              title="ik gmail,gay"
            />
          </div>
          <div class="security">
            <input
              class="password"
              type="password"
              name="password"
              placeholder="Type your password"
              title="Huhhh! her birth-date"
            />
          </div>
          <div class="submission">
            <button class="log-in" type="submit" title="make sure to recheck">
              Log in
            </button>
          </div>
        </form>

        <div>
          <p>
            To be a part of our family &#63;<a href="logup.html" class="log-up"
              >Log up
            </a>
          </p>
        </div>
      </div>
    </main>
    <script></script>
  </body>
</html>
